<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect for fonts (must be before stylesheet) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts with display=swap for fast first paint -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
      />
    </noscript>

    <!-- Title & Description -->
    <title>Priyanshu Pramanik — Software Engineer</title>
    <meta name="description" content="Building full-stack systems, automation pipelines, and AI integrations — from architecture to deployment." />
    <meta name="keywords" content="Software Engineer, Full-Stack Developer, React, Node.js, Python, PostgreSQL, Kolkata" />
    <meta name="author" content="Priyanshu Pramanik" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://portfolio-de9q.onrender.com" />
    <meta property="og:title" content="Priyanshu Pramanik — Software Engineer" />
    <meta property="og:description" content="Building full-stack systems, automation pipelines, and AI integrations." />
    <meta property="og:image" content="https://portfolio-de9q.onrender.com/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Priyanshu Pramanik — Software Engineer" />
    <meta name="twitter:description" content="Building full-stack systems, automation pipelines, and AI integrations." />
    <meta name="twitter:image" content="https://portfolio-de9q.onrender.com/og-image.jpg" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://portfolio-de9q.onrender.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
